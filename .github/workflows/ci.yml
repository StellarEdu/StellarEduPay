name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# GitHub deprecated the Node.js 20 runtime for actions on 2026-06-16.
# This flag forces legacy Node.js 20 action runtimes to run under Node.js 24
# until the underlying actions publish native Node.js 24 releases.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    name: Dependency security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache@v6
        with:
          path: |
            backend/node_modules
            frontend/node_modules
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - run: npm ci
      - run: cd backend && npm ci && cd ..
      - run: cd frontend && npm ci && cd ..

      # Fails on any high/critical advisory that has no current, non-expired
      # entry in security-exceptions.json. See docs/dependency-triage.md.
      - name: Audit root
        run: node scripts/check-dependency-audit.js .

      - name: Audit backend
        run: node scripts/check-dependency-audit.js backend

      - name: Audit frontend
        run: node scripts/check-dependency-audit.js frontend

  test:
    runs-on: ubuntu-latest
    env:
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      # Tests mock Mongoose — a standalone instance is sufficient for unit tests.
      # Integration tests that require a replica set are guarded by RUN_INTEGRATION_TESTS.
      MONGO_URI: mongodb://localhost:27017/stellaredupay_test
      # Dummy secrets required by config/index.js validation before test files can set them.
      JWT_SECRET: ci-test-jwt-secret-not-used-in-production
      SCHOOL_WALLET_ADDRESS: GBBD47IF6LWK7P7MDEVSCWR7DPUWV3NY3DTQEVFL4NAT4AQH3ZLLFLA5

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache@v6
        with:
          path: |
            backend/node_modules
            frontend/node_modules
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - run: npm ci

      - run: cd backend && npm ci && cd ..

      - run: cd frontend && npm ci && cd ..

      - run: npm test
